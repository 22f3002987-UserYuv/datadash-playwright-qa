name: DataDash QA Automation
on: [push]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npx playwright install

      # IMPORTANT STEP WITH YOUR EMAIL
      - name: Run scraper - 22f3002987@ds.study.iitm.ac.in
        run: node scrape.js
